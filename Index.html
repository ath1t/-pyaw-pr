<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>pyaw.pr - Terminal</title>

<style>
:root{
  --bg:#0a0a0f;
  --green:#00ff9c;
  --green-dim:#00ff9c22;
  --red:#ff3366;
  --pink:#ff6b9d;
  --gold:#ffd700;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--bg);
  color:var(--green);
  font-family:'Inter','Courier New',monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:16px;
  overflow-x:hidden;
}

.terminal{
  width:100%;
  max-width:560px;
  border:1px solid var(--green-dim);
  border-radius:14px;
  padding:26px;
  box-shadow:0 0 30px #00ff9c15, 0 0 60px #00ff9c08;
  position:relative;
  transition:box-shadow 0.5s;
}

.terminal.glow-red{box-shadow:0 0 40px #ff336633,0 0 80px #ff336611;}
.terminal.glow-pink{box-shadow:0 0 40px #ff6b9d33,0 0 80px #ff6b9d11;}
.terminal.glow-gold{box-shadow:0 0 40px #ffd70033,0 0 80px #ffd70011;}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
  font-size:13px;
  opacity:0.6;
  border-bottom:1px solid var(--green-dim);
  padding-bottom:6px;
}

.total-clicks{
  font-size:11px;
  opacity:0.5;
  font-style:italic;
}

.line{margin:16px 0 8px;font-size:14px;opacity:0.8;}

.btn{
  display:inline-block;
  margin:5px 8px 0 0;
  padding:7px 16px;
  border:1px solid var(--green-dim);
  border-radius:20px;
  cursor:pointer;
  transition:all 0.2s;
}

.btn:hover{border-color:var(--green);transform:translateY(-1px);}
.btn:active{transform:scale(0.95);}
.btn.active{
  background:var(--green);
  color:#000;
  box-shadow:0 0 20px #00ff9c44;
}

.love{
  margin-top:14px;
  display:inline-block;
  padding:9px 22px;
  border:1px solid var(--green);
  border-radius:30px;
  cursor:pointer;
  transition:all 0.3s;
  position:relative;
  overflow:hidden;
}
.love.disabled{opacity:0.3;pointer-events:none;}
.love:hover{
  background:var(--green);
  color:#000;
  transform:scale(1.03);
  box-shadow:0 0 25px #00ff9c44;
}
.love:active{transform:scale(0.96);}

.heart-particle{
  position:absolute;
  pointer-events:none;
  font-size:16px;
  animation:floatUp 0.8s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-40px) scale(0.3);}
}

.output-area{
  margin-top:22px;
  border-top:1px solid var(--green-dim);
  padding-top:12px;
  min-height:70px;
}

.cursor{
  display:inline-block;
  width:8px;
  height:14px;
  background:var(--green);
  margin-left:4px;
  animation:blink 1s infinite;
  vertical-align:middle;
}
.cursor.typing{animation:none;background:var(--green);}
@keyframes blink{50%{opacity:0;}}

.troll{
  margin-top:14px;
  font-size:32px;
  opacity:0;
  transform:scale(0.3) rotate(-15deg);
  transition:all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  text-align:center;
  filter:blur(8px);
  pointer-events:none;
}
.troll.show{
  opacity:1;
  transform:scale(1) rotate(2deg);
  filter:blur(0);
}

.reset{
  margin-top:16px;
  font-size:11px;
  cursor:pointer;
  color:var(--green-dim);
}
.reset:hover{color:var(--red);}

.scanline{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(to bottom,transparent 50%,rgba(0,255,156,0.02) 51%);
  background-size:100% 4px;
  z-index:999;
}

.confetti-container{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1000;
}

@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(var(--rot));opacity:0;}
}
</style>
</head>

<body>

<div class="scanline"></div>
<div class="confetti-container" id="confetti"></div>

<div class="terminal" id="terminal">
  <div class="header">
    <span>⚡ pyaw.pr</span>
    <span class="total-clicks" id="totalDisplay"></span>
  </div>

  <div class="line">▸ select gender</div>
  <div>
    <span class="btn" onclick="setGender('male',this)">👨 male</span>
    <span class="btn" onclick="setGender('female',this)">👩 female</span>
  </div>

  <div class="line">▸ express your feeling</div>
  <div class="love disabled" id="loveBtn" onclick="love()">💚 love</div>

  <div class="output-area">
    <span id="out">▸</span><span class="cursor" id="cursor"></span>
  </div>

  <div class="troll" id="troll">( ͡° ͜ʖ ͡°)</div>
  <div class="reset" onclick="resetAll()">⟳ reset</div>
</div>

<script>
const state={
  gender:null,
  count:0,
  lock:false,
  total:parseInt(localStorage.getItem('pyaw_total_love')||'0')
};

const outEl=document.getElementById('out');
const cursor=document.getElementById('cursor');
const terminal=document.getElementById('terminal');
const troll=document.getElementById('troll');

document.getElementById('totalDisplay').textContent='❤️ lifetime: '+state.total;

/* ── AUDIO ── */
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }
  return audioCtx;
}
function beep(f,d,g=0.05){
  const ctx=getAudioCtx();
  const o=ctx.createOscillator();
  const gn=ctx.createGain();
  o.type='square';
  o.frequency.value=f;
  gn.gain.value=g;
  o.connect(gn);gn.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+d);
}

/* ── TYPING ── */
let typingId=0;
function typeOut(text){
  const id=++typingId;
  cursor.classList.add('typing');
  outEl.textContent='▸ ';
  if(!text){
    cursor.classList.remove('typing');
    return;
  }
  let i=0;
  function t(){
    if(id!==typingId)return;
    if(i<text.length){
      outEl.textContent='▸ '+text.slice(0,i+1);
      beep(1200,0.015,0.03);
      i++;
      setTimeout(t,25+Math.random()*35);
    }else{
      cursor.classList.remove('typing');
    }
  }
  t();
}

/* ── UI ── */
function setGender(g,e){
  state.gender=g;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  e.classList.add('active');
  document.getElementById('loveBtn').classList.remove('disabled');
  hideTroll();
  terminal.classList.remove('glow-red','glow-gold','glow-pink');
  if(g==='female'){
    terminal.classList.add('glow-pink');
    typeOut('interesting choice... 😏');
  }else{
    terminal.classList.add('glow-gold');
    typeOut('noted.');
  }
}

function hideTroll(){
  troll.classList.remove('show');
}

function showTroll(){
  troll.classList.add('show');
  beep(200,0.15,0.06);
  setTimeout(()=>beep(150,0.2,0.06),150);
}

function spawnHearts(){
  const btn=document.getElementById('loveBtn');
  const hearts=['💚','💕','💗','💖','✨'];
  for(let i=0;i<6;i++){
    const h=document.createElement('span');
    h.className='heart-particle';
    h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left=(10+Math.random()*70)+'%';
    h.style.top=Math.random()*15+'px';
    h.style.animationDuration=(0.5+Math.random()*0.6)+'s';
    btn.appendChild(h);
    setTimeout(()=>h.remove(),900);
  }
}

function spawnConfetti(){
  const c=document.getElementById('confetti');
  const colors=['#00ff9c','#ff3366','#ffd700','#ff6b9d','#00ccff','#ff8800'];
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    const left=Math.random()*100;
    const rot=360+Math.random()*720;
    const delay=Math.random()*0.8;
    d.style.cssText=`
      position:fixed;
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${left}%;
      top:-10px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation:confettiFall ${2+Math.random()*3}s ${delay}s linear forwards;
    `;
    d.style.setProperty('--rot',`${rot}deg`);
    c.appendChild(d);
    setTimeout(()=>d.remove(),4000+delay*1000);
  }
}

/* ── LOVE ── */
function love(){
  if(state.lock)return;
  state.lock=true;setTimeout(()=>state.lock=false,400);

  if(!state.gender){
    typeOut('select gender first');
    beep(300,0.1,0.06);
    return;
  }

  spawnHearts();

  // 🚫 MALE = TROLL
  if(state.gender==='male'){
    typeOut("I'm not into that");
    terminal.classList.add('glow-red');
    setTimeout(()=>{
      showTroll();
      terminal.classList.remove('glow-red');
    },600);
    return;
  }

  // 💖 FEMALE = LOVE COUNTER
  state.count++;
  state.total++;
  localStorage.setItem('pyaw_total_love',state.total);
  document.getElementById('totalDisplay').textContent='❤️ lifetime: '+state.total;

  let msg='';
  switch(state.count){
    case 1:  msg='good choice ;)'; break;
    case 2:  msg='you\'re sweet'; break;
    case 3:  msg='i like that'; break;
    case 4:  msg='okay okay i see you 👀'; break;
    case 5:  msg='you win my attention'; spawnConfetti(); break;
    case 6:  msg='this is getting serious...'; break;
    case 7:  msg='you know this is a terminal right?'; break;
    case 8:  msg='i\'m just text on a screen...'; break;
    case 9:  msg='...or am i?'; 
             terminal.classList.add('glow-pink');
             setTimeout(()=>terminal.classList.remove('glow-pink'),2000);
             break;
    case 10: msg='fine. you unlocked my secret.'; spawnConfetti(); break;
    default:
      const extras=[
        'i will text you privately',
        'sorry i\'m shy 🙈',
        'my DMs are open... theoretically',
        'error: feelings overflow',
        '404: love not found (jk)',
        'sudo love --force',
        'beep boop. i mean, hey 😘',
        'you\'re persistent, i\'ll give you that',
        'accessing mainframe... just kidding'
      ];
      msg=extras[Math.floor(Math.random()*extras.length)];
      if(Math.random()>0.7)spawnConfetti();
      break;
  }

  typeOut(msg);
  beep(660,0.08,0.04);
  setTimeout(()=>beep(880,0.1,0.04),80);
}

/* ── RESET ── */
function resetAll(){
  state.gender=null;
  state.count=0;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('loveBtn').classList.add('disabled');
  terminal.classList.remove('glow-red','glow-gold','glow-pink');
  hideTroll();
  typeOut('');
  beep(500,0.06,0.03);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.key==='l'||e.key==='L')love();
  if(e.key==='r'||e.key==='R')resetAll();
});

</script>
</body>
</html>
