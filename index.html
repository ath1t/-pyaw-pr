<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>pyaw.pr</title>

<style>
:root{
  --bg:#05070a;
  --panel:rgba(20,25,35,0.7);
  --text:#e6edf3;
  --accent:#ff4d6d;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  background: radial-gradient(circle at 50% 20%, #0b1220, #05070a);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* shake */
.shake{
  animation:shake 0.4s;
}
@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(5px,-5px);}
  50%{transform:translate(-5px,5px);}
  75%{transform:translate(5px,5px);}
  100%{transform:translate(0,0);}
}

/* card */
.card{
  width:100%;
  max-width:420px;
  padding:20px;
  border-radius:16px;
  backdrop-filter: blur(20px);
  background:var(--panel);
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  text-align:center;
}

h1{margin:0;font-size:20px;}
.sub{margin-top:6px;font-size:12px;opacity:0.6;}

/* gender selector */
.gender{
  margin:14px 0;
  display:flex;
  gap:10px;
  justify-content:center;
}

.gbtn{
  padding:8px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
  font-size:13px;
  opacity:0.6;
}

.gbtn.active{
  border-color:var(--accent);
  opacity:1;
}

/* reactions */
.reactions{
  margin:20px 0;
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.btn{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.02);
  color:#888;
  cursor:not-allowed;
}

/* only love active */
.love{
  cursor:pointer;
  color:#fff;
  border-color:var(--accent);
}
.love:hover{
  background:var(--accent);
  color:#000;
  transform:scale(1.05);
}

/* output */
.output{
  margin-top:16px;
  min-height:40px;
  font-size:13px;
  white-space:pre-line;
}

/* typing cursor */
.cursor{
  display:inline-block;
  width:8px;
  background:var(--accent);
  margin-left:4px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0;}}

/* troll face */
.troll{
  font-size:60px;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<div class="card" id="card">

  <h1>pyaw.pr</h1>
  <div class="sub">choose wisely 😏</div>

  <!-- gender select -->
  <div class="gender">
    <div class="gbtn" onclick="setGender('male', this)">male</div>
    <div class="gbtn" onclick="setGender('female', this)">female</div>
  </div>

  <!-- reactions -->
  <div class="reactions">
    <div class="btn">like</div>
    <div class="btn love" onclick="love()">love</div>
    <div class="btn">haha</div>
    <div class="btn">wow</div>
    <div class="btn">sad</div>
    <div class="btn">angry</div>
  </div>

  <div class="output" id="out"></div>
  <div class="troll" id="troll">( ͡° ͜ʖ ͡°)</div>

</div>

<script>
let count = 0;
let gender = null;

function setGender(g, el){
  gender = g;
  document.querySelectorAll(".gbtn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

/* typing */
function typeText(el, text, speed=30){
  el.innerHTML = "";
  let i = 0;
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  el.appendChild(cursor);

  const interval = setInterval(()=>{
    if(i < text.length){
      cursor.insertAdjacentText("beforebegin", text[i]);
      i++;
    }else{
      clearInterval(interval);
    }
  }, speed);
}

function love(){
  const out = document.getElementById("out");
  const troll = document.getElementById("troll");
  const card = document.getElementById("card");

  if(!gender){
    return alert("select gender first");
  }

  // male special troll
  if(gender === "male"){
    typeText(out, "> I ain't no Gae.");
    troll.style.display = "block";
    return;
  }

  count++;

  const msgs = [
    "good choice.",
    "as expected.",
    "no other option anyway.",
    "love detected.",
    "system approves."
  ];

  if(count < 5){
    typeText(out, "> " + msgs[Math.floor(Math.random()*msgs.length)]);
  }else{
    typeText(out, "> I will text you privately.");

    setTimeout(()=>{
      troll.style.display="block";
      card.classList.add("shake");
      setTimeout(()=>card.classList.remove("shake"),400);
    },800);

    setTimeout(()=>{
      window.location.href = "https://example.com";
    },3000);
  }
}
</script>

</body>
</html>
