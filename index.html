<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>pyaw.pr</title>

<style>
:root{
  --bg:#000;
  --green:#00ff9c;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--green);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* terminal box */
.terminal{
  width:100%;
  max-width:420px;
  padding:20px;
  border:1px solid #00ff9c44;
  box-shadow:0 0 20px #00ff9c22;
}

/* header */
.header{
  margin-bottom:10px;
  font-size:14px;
  opacity:0.7;
}

/* line */
.line{
  margin:6px 0;
}

/* buttons */
.btn{
  display:inline-block;
  margin:4px 4px 0 0;
  padding:4px 8px;
  border:1px solid #00ff9c44;
  cursor:pointer;
}

.btn.active{
  background:#00ff9c22;
}

/* love */
.love{
  margin-top:10px;
  display:inline-block;
  padding:6px 10px;
  border:1px solid var(--green);
  cursor:pointer;
}

.love:hover{
  background:var(--green);
  color:#000;
}

/* cursor */
.cursor{
  display:inline-block;
  width:8px;
  height:14px;
  background:var(--green);
  margin-left:4px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0;}}

/* troll */
.troll{
  margin-top:10px;
  font-size:24px;
  opacity:0;
  transition:0.2s;
}
.troll.show{opacity:1;}
</style>
</head>

<body>

<div class="terminal">

  <div class="header">pyaw.pr v1.0</div>

  <div class="line">> select gender:</div>
  <div>
    <span class="btn" onclick="setGender('male', this)">male</span>
    <span class="btn" onclick="setGender('female', this)">female</span>
  </div>

  <div class="line">> react:</div>
  <div class="love" onclick="love()">love</div>

  <div class="line" id="out">></div>
  <span class="cursor"></span>

  <div class="troll" id="troll">( ͡° ͜ʖ ͡°)</div>

</div>

<script>
let gender = null;
let count = 0;

function setGender(g, el){
  gender = g;
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function showTroll(){
  document.getElementById("troll").classList.add("show");
}

function hideTroll(){
  document.getElementById("troll").classList.remove("show");
}

function love(){
  const out = document.getElementById("out");

  if(!gender){
    out.innerText = "> select gender first";
    return;
  }

  hideTroll();

  if(gender === "male"){
    out.innerText = "> I ain't no Gae.";
    showTroll();
    return;
  }

  count++;

  if(count < 5){
    out.innerText = "> good choice.";
  }else{
    out.innerText = "> I will text you privately.";
    showTroll();
  }
}
</script>

</body>
</html>
