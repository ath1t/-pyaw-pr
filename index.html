<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>pyaw.pr</title>

<style>
body{
  margin:0;
  font-family: monospace;
  background:#05070a;
  color:#e6edf3;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  text-align:center;
  max-width:360px;
}

.gender{
  margin:10px 0;
}

button{
  margin:5px;
  padding:8px 12px;
  cursor:pointer;
}

.love{
  background:#ff4d6d;
  color:#000;
}

.troll{
  font-size:50px;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<div class="card">

  <h2>pyaw.pr</h2>

  <div class="gender">
    <button onclick="setGender('male')">male</button>
    <button onclick="setGender('female')">female</button>
  </div>

  <div>
    <button class="love" onclick="love()">love</button>
  </div>

  <div id="out"></div>
  <div class="troll" id="troll">( ͡° ͜ʖ ͡°)</div>

</div>

<script>
let gender = null;
let count = 0;

function setGender(g){
  gender = g;
}

function love(){
  const out = document.getElementById("out");
  const troll = document.getElementById("troll");

  if(!gender){
    alert("select gender first");
    return;
  }

  troll.style.display = "none";

  if(gender === "male"){
    out.innerText = "I ain't no Gae.";
    troll.style.display = "block";
    return;
  }

  count++;

  if(count < 5){
    out.innerText = "ok...";
  }else{
    out.innerText = "I will text you privately.";
    troll.style.display = "block";
  }
}
</script>

</body>
</html>
