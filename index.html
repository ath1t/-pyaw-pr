<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>pyaw.pr</title>

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.05);
  --text:#e6edf3;
  --accent:#ff4d6d;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #111827, #020617);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* card */
.card{
  width:100%;
  max-width:360px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  text-align:center;
}

h2{
  margin:0;
  font-weight:600;
}

.sub{
  font-size:12px;
  opacity:0.6;
  margin-top:4px;
}

/* gender buttons */
.gender{
  display:flex;
  gap:10px;
  margin:16px 0;
}

.gbtn{
  flex:1;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
  cursor:pointer;
  transition:0.2s;
}

.gbtn.active{
  border-color:var(--accent);
  background:rgba(255,77,109,0.1);
}

/* love button */
.love{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg, #ff4d6d, #ff758f);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.love:hover{
  transform:scale(1.05);
}

/* output */
#out{
  margin-top:16px;
  font-size:14px;
  min-height:24px;
  opacity:0.9;
}

/* troll face */
.troll{
  font-size:50px;
  margin-top:10px;
  opacity:0;
  transform:scale(0.8);
  transition:0.25s;
}

.troll.show{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<div class="card">

  <h2>pyaw.pr</h2>
  <div class="sub">choose wisely 😏</div>

  <div class="gender">
    <div class="gbtn" onclick="setGender('male', this)">male</div>
    <div class="gbtn" onclick="setGender('female', this)">female</div>
  </div>

  <button class="love" onclick="love()">❤️ love</button>

  <div id="out"></div>
  <div class="troll" id="troll">( ͡° ͜ʖ ͡°)</div>

</div>

<script>
let gender = null;
let count = 0;

function setGender(g, el){
  gender = g;
  document.querySelectorAll(".gbtn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

function showTroll(){
  document.getElementById("troll").classList.add("show");
}

function hideTroll(){
  document.getElementById("troll").classList.remove("show");
}

function love(){
  const out = document.getElementById("out");

  if(!gender){
    alert("select gender first");
    return;
  }

  hideTroll();

  if(gender === "male"){
    out.innerText = "I ain't no Gae.";
    showTroll();
    return;
  }

  count++;

  if(count < 5){
    out.innerText = "good choice.";
  }else{
    out.innerText = "I will text you privately.";
    showTroll();
  }
}
</script>

</body>
</html>
