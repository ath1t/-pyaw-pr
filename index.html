<script>
const state={
  gender:null,
  count:0,
  lock:false,
  total:+localStorage.getItem('pyaw_total_love')||0
};

const out=document.getElementById('out');
const cursor=document.getElementById('cursor');
const terminal=document.getElementById('terminal');
const troll=document.getElementById('troll');
const confetti=document.getElementById('confetti');

document.getElementById('totalDisplay').textContent='❤️ '+state.total;

/* ================= SOUND ENGINE ================= */
const Sound={
  ctx:null,
  unlocked:false,

  init(){
    if(!this.ctx){
      this.ctx=new (window.AudioContext||window.webkitAudioContext)();
    }
    if(this.ctx.state==='suspended'){
      this.ctx.resume();
    }
    this.unlocked=true;
  },

  beep(freq,dur,type='square',vol=0.05){
    if(!this.unlocked) return;
    const o=this.ctx.createOscillator();
    const g=this.ctx.createGain();

    o.type=type;
    o.frequency.value=freq;

    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);

    o.connect(g); g.connect(this.ctx.destination);
    o.start();
    o.stop(this.ctx.currentTime+dur);
  },

  click(){ this.beep(900,0.03,'square',0.03); },

  typing(){ this.beep(1200,0.015,'square',0.02); },

  success(){
    this.beep(523,0.08);
    setTimeout(()=>this.beep(659,0.08),80);
    setTimeout(()=>this.beep(784,0.1),160);
  },

  error(){
    this.beep(220,0.12,'sawtooth',0.06);
    setTimeout(()=>this.beep(160,0.15,'sawtooth',0.06),120);
  },

  troll(){
    [300,250,200,150].forEach((f,i)=>{
      setTimeout(()=>this.beep(f,0.08,'square',0.05),i*80);
    });
  }
};

/* Unlock audio on first interaction */
document.addEventListener('pointerdown',()=>Sound.init(),{once:true});

/* ================= TYPING ================= */
let tid=0;
function typeOut(t){
  const id=++tid;
  cursor.classList.add('typing');
  let i=0;

  function loop(){
    if(id!==tid) return;
    if(i<t.length){
      out.textContent='▸ '+t.slice(0,++i);
      Sound.typing();
      setTimeout(loop,25+Math.random()*30);
    }else{
      cursor.classList.remove('typing');
    }
  }
  loop();
}

/* ================= HELPERS ================= */
function clearGlow(){
  terminal.classList.remove('glow-red','glow-pink','glow-gold');
}
function hideTroll(){ troll.classList.remove('show'); }

/* ================= CONFETTI ================= */
function spawnConfetti(){
  confetti.innerHTML='';
  for(let i=0;i<25;i++){
    const d=document.createElement('div');
    d.style.cssText=`
      position:fixed;
      width:8px;height:8px;
      background:#00ff9c;
      left:${Math.random()*100}%;
      top:-10px;
      animation:confettiFall 3s linear forwards;
    `;
    d.style.setProperty('--rot',Math.random()*720+'deg');
    confetti.appendChild(d);
  }
  setTimeout(()=>confetti.innerHTML='',3500);
}

/* ================= UI ================= */
function setGender(g,e){
  Sound.click();

  state.gender=g;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  e.classList.add('active');

  document.getElementById('loveBtn').classList.remove('disabled');
  hideTroll();
  clearGlow();

  if(g==='female'){
    terminal.classList.add('glow-pink');
    typeOut('interesting choice...');
  }else{
    terminal.classList.add('glow-gold');
    typeOut('noted.');
  }
}

function love(){
  if(state.lock) return;
  state.lock=true;
  setTimeout(()=>state.lock=false,300);

  if(!state.gender){
    typeOut('select gender first');
    Sound.error();
    return;
  }

  hideTroll();

  if(state.gender==='male'){
    typeOut("I'm not into that");
    clearGlow();
    terminal.classList.add('glow-red');
    Sound.error();
    setTimeout(()=>{
      troll.classList.add('show');
      Sound.troll();
    },500);
    return;
  }

  state.count++;
  state.total++;
  localStorage.setItem('pyaw_total_love',state.total);
  document.getElementById('totalDisplay').textContent='❤️ '+state.total;

  if(state.count===5){
    typeOut('you win');
    spawnConfetti();
    Sound.success();
  }else{
    typeOut('keep going...');
    Sound.click();
  }
}
</script>
